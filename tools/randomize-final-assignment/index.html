<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomize Final Assignment</title>
    <link rel="stylesheet" href="../../styles/styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page-card">
        <nav class="back-link"><a href="../index.html">Tools</a></nav>
        <h1>Randomize Final Assignment</h1>
        <div class="mode-toggle" role="tablist" aria-label="Assignment tool mode">
            <button type="button" class="mode-button is-active" data-mode-target="generateMode"
                aria-selected="true">Generate New Assignments</button>
            <button type="button" class="mode-button" data-mode-target="repairMode"
                aria-selected="false">Repair Existing Assignments</button>
        </div>

        <section id="generateMode" class="tool-mode is-active">
            <form id="assignmentForm">
                <p>Enter one role and one student per line.</p>
                <label for="projectRoles">Project Roles</label>
                <textarea id="projectRoles" name="projectRoles" rows="6" required
                    placeholder="Client&#10;Lead Developer&#10;Junior Developer 1&#10;Junior Developer 2">Client
Lead Developer
Junior Developer 1
Junior Developer 2</textarea>
                <label for="studentNames">Student Names</label>
                <textarea id="studentNames" name="studentNames" rows="10" required
                    placeholder="Jane Doe&#10;John Smith&#10;..."></textarea>
                <button type="submit">Assign Roles</button>
            </form>
            <div id="assignmentResults"></div>
        </section>

        <section id="repairMode" class="tool-mode" hidden>
            <form id="repairForm">
                <p>Paste an existing assignment table, load students, then repair for one dropped student.</p>
                <label for="existingTableHtml">Existing Table HTML</label>
                <textarea id="existingTableHtml" name="existingTableHtml" rows="10" required
                    placeholder="Paste the full <table>...</table> HTML here"></textarea>
                <button id="loadRepairTable" type="button">Load Table Students</button>
                <label for="droppedStudent">Dropped Student</label>
                <select id="droppedStudent" name="droppedStudent" required>
                    <option value="">Load table first...</option>
                </select>
                <label for="repairStrategy">Repair Strategy</label>
                <select id="repairStrategy" name="repairStrategy">
                    <option value="minimal" selected>Minimal changes</option>
                    <option value="minimize-pairs">Minimize repeated pairs</option>
                    <option value="no-extra-swaps">No extra swaps (may keep duplicate roles in a project)</option>
                </select>
                <button type="submit">Repair Assignments</button>
            </form>
            <div id="repairResults"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
